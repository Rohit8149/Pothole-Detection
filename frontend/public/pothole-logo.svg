<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#103fba;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#666;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#888;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e65c00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" stroke="#fff" stroke-width="2"/>
  
  <!-- Road surface -->
  <rect x="15" y="40" width="70" height="20" fill="url(#roadGradient)" rx="2"/>
  
  <!-- Road marking lines -->
  <rect x="20" y="48" width="8" height="2" fill="#fff" opacity="0.8"/>
  <rect x="32" y="48" width="8" height="2" fill="#fff" opacity="0.8"/>
  <rect x="44" y="48" width="8" height="2" fill="#fff" opacity="0.8"/>
  <rect x="56" y="48" width="8" height="2" fill="#fff" opacity="0.8"/>
  <rect x="68" y="48" width="8" height="2" fill="#fff" opacity="0.8"/>
  
  <!-- Pothole (irregular shape) -->
  <ellipse cx="42" cy="50" rx="8" ry="6" fill="#333" opacity="0.8"/>
  <ellipse cx="44" cy="48" rx="4" ry="3" fill="#222" opacity="0.6"/>
  
  <!-- Warning triangle -->
  <polygon points="65,25 75,40 55,40" fill="url(#warningGradient)" stroke="#fff" stroke-width="1"/>
  <text x="65" y="37" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">!</text>
  
  <!-- Detection rays/scan lines -->
  <path d="M 25 15 L 35 25" stroke="#28a745" stroke-width="2" opacity="0.7"/>
  <path d="M 30 12 L 40 22" stroke="#28a745" stroke-width="2" opacity="0.7"/>
  <path d="M 35 10 L 45 20" stroke="#28a745" stroke-width="2" opacity="0.7"/>
  
  <!-- AI/Tech nodes -->
  <circle cx="20" cy="25" r="3" fill="#28a745" opacity="0.8"/>
  <circle cx="80" cy="25" r="3" fill="#28a745" opacity="0.8"/>
  <circle cx="25" cy="75" r="3" fill="#28a745" opacity="0.8"/>
  <circle cx="75" cy="75" r="3" fill="#28a745" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="20" y1="25" x2="35" y2="18" stroke="#28a745" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="25" x2="65" y2="32" stroke="#28a745" stroke-width="1" opacity="0.5"/>
</svg>
