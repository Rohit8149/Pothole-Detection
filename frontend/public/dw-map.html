<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DW Pothole Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #map { height: 700px; width: 100%; }
  </style>
</head>
<body>
<h1>Pothole Dashboard - Roads</h1>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([19.1, 72.8], 10); // center over Maharashtra

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  function colorByRepair(avgRepair) {
    if(avgRepair >= 48) return 'red';
    if(avgRepair >= 24) return 'orange';
    return 'green';
  }

  fetch('http://127.0.0.1:5000/dwm/api/road-agg')
    .then(res => res.json())
    .then(data => {
      data.forEach(r => {
        if(r.avg_lat && r.avg_lng) {
          L.circleMarker([+r.avg_lat, +r.avg_lng], {
            radius: Math.log(r.total_potholes + 1) * 3,
            color: colorByRepair(+r.avg_repair_hours),
            fillOpacity: 0.6
          }).bindPopup(`
            <b>${r.road_name}</b><br>
            City: ${r.city}<br>
            Total potholes: ${r.total_potholes}<br>
            Avg repair: ${r.avg_repair_hours}h
          `).addTo(map);
        }
      });
    });
</script>
</body>
</html>
